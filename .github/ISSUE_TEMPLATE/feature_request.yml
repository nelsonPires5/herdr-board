name: Feature request
description: Suggest an idea or improvement for herdr-board
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what gets in the way today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like the board to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you're using now.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, examples, related tools, which crate(s) it likely touches.
    validations:
      required: false
